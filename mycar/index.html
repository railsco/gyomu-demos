<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>マイカー利用費 申請（デモ）</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root { --ink:#17323F; --accent:#11688A; --deep:#0E5876; --line:#E1ECF1; --hair:#EAF2F5; --muted:#5E7A87; --warn:#C0392B; --tint:#F0F7FA; }
  * { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,"Hiragino Sans","Yu Gothic",sans-serif; }
  body { background:#fff; color:var(--ink); padding:28px 20px 96px; }
  .top { max-width:640px; margin:0 auto 28px; font-size:12px; color:var(--muted); display:flex; justify-content:space-between; gap:12px; }
  .top a { color:var(--muted); text-decoration:none; }
  .top a:hover { color:var(--accent); }
  main { max-width:640px; margin:0 auto; }
  h1 { font-size:24px; font-weight:700; letter-spacing:-0.01em; margin-bottom:6px; }
  .sub { font-size:14px; color:var(--muted); margin-bottom:28px; }
  label { display:block; font-size:12px; font-weight:600; color:var(--muted); margin:18px 0 8px; letter-spacing:0.02em; }
  input, select { width:100%; font-size:16px; padding:14px 16px; border:1.5px solid var(--line); border-radius:10px; background:#fff; color:var(--ink); }
  input::placeholder { color:#A9BDC6; }
  input:focus { outline:none; border-color:var(--accent); }
  .row2 { display:flex; gap:12px; }
  .row2 > div { flex:1; }
  .check { display:flex; align-items:center; gap:10px; margin-top:18px; font-size:16px; }
  .check input { width:22px; height:22px; accent-color:var(--accent); }
  #calc { width:100%; font-size:15px; font-weight:700; padding:14px 0; margin-top:22px; border:1.5px solid var(--accent); border-radius:10px; background:#fff; color:var(--accent); }
  #calc:hover { background:var(--tint); }
  #calc:disabled { opacity:.4; }
  .result { display:flex; gap:12px; margin-top:16px; }
  .rbox { flex:1; border-radius:12px; padding:14px 8px 12px; text-align:center; background:var(--tint); }
  .rbox .n { font-size:24px; font-weight:700; color:var(--ink); font-variant-numeric:tabular-nums; letter-spacing:-0.02em; }
  .rbox .n input { font-size:24px; font-weight:700; color:var(--ink); text-align:center; border:none; background:none; width:100%; padding:0; font-variant-numeric:tabular-nums; }
  .rbox .n input:focus { outline:none; border-bottom:2px solid var(--accent); border-radius:0; }
  .rbox .l { font-size:12px; color:var(--muted); margin-top:3px; }
  #amount { font-size:24px; font-weight:700; color:var(--ink); letter-spacing:-0.02em; }
  #amount.lit { color:var(--accent); }
  #submit { width:100%; font-size:18px; font-weight:700; padding:18px 0; margin-top:24px; border:none; border-radius:12px; background:var(--accent); color:#fff; letter-spacing:0.04em; }
  #submit:hover { background:var(--deep); }
  #submit:disabled { opacity:.4; }
  h2 { font-size:13px; font-weight:600; color:var(--muted); letter-spacing:0.06em; margin:48px 0 10px; display:flex; justify-content:space-between; align-items:baseline; }
  h2 a { font-size:13px; font-weight:600; color:var(--accent); text-decoration:none; }
  h2 a:hover { text-decoration:underline; }
  .app { padding:16px 0; border-bottom:1px solid var(--hair); display:flex; align-items:center; gap:14px; }
  .app .info { flex:1; font-size:15px; font-weight:600; }
  .app .meta { font-size:13px; font-weight:400; color:var(--muted); margin-top:3px; }
  .app .amt { font-size:17px; font-weight:700; white-space:nowrap; font-variant-numeric:tabular-nums; }
  .app button { font-size:14px; font-weight:700; padding:10px 18px; border:1.5px solid var(--accent); border-radius:10px; background:#fff; color:var(--accent); white-space:nowrap; }
  .app button:hover { background:var(--tint); }
  .ok { display:inline-block; font-size:12px; font-weight:700; color:var(--accent); background:var(--tint); border-radius:999px; padding:4px 12px; }
  .empty { font-size:13px; color:var(--muted); padding:14px 0; line-height:1.7; }
  .note { font-size:12px; color:var(--muted); margin-top:10px; line-height:1.7; }
  #err { color:var(--warn); font-size:13px; margin-top:8px; display:none; }
  #map { height:300px; border-radius:12px; margin-top:10px; border:1.5px solid var(--line); }
  @media (min-width:900px) {
    .top { max-width:1100px; }
    main { max-width:1100px; display:grid; grid-template-columns:5fr 6fr; column-gap:56px; align-items:start; }
    h1, .sub { grid-column:1 / -1; }
    .col-form { grid-column:1; }
    .col-list { grid-column:2; }
    .col-list h2 { margin-top:0; }
  }
</style>
</head>
<body>
<div class="top"><a href="../">← デモ一覧</a><span>デモ版 — 記録はこの端末のみ</span></div>
<main>
  <h1>マイカー利用費 申請</h1>
  <p class="sub">出発地と目的地を入れるだけ。距離と支給額は自動で計算します。</p>

  <div class="col-form">
    <div class="row2">
      <div><label>利用日</label><input id="date" type="date"></div>
      <div><label>氏名</label><input id="name" type="text" placeholder="例: 山田 花子"></div>
    </div>
    <label>出発地</label>
    <input id="from" type="text" placeholder="例: 会社・事業所の住所" autocomplete="off">
    <label>目的地</label>
    <input id="to" type="text" placeholder="例: 訪問先の名称や住所" autocomplete="off">
    <label>または地図をタップして選ぶ</label>
    <div class="seg" id="mapmode">
      <button type="button" data-m="from" class="on">① 出発地を指定</button>
      <button type="button" data-m="to">② 目的地を指定</button>
    </div>
    <div id="map"></div>
    <div class="check"><input id="round" type="checkbox" checked><label for="round" style="margin:0;font-size:16px;color:var(--ink)">往復</label></div>
    <button id="calc">入力した住所から距離を計算</button>
    <div id="err"></div>
    <div class="result">
      <div class="rbox"><div class="n"><input id="km" type="number" step="0.1" min="0" placeholder="—"></div><div class="l">距離（km・手修正可）</div></div>
      <div class="rbox"><div class="n"><input id="rate" type="number" step="1" min="0" value="15"></div><div class="l">単価（円/km）</div></div>
      <div class="rbox"><div class="n" id="amount">—</div><div class="l">支給額（円）</div></div>
    </div>
    <button id="submit">この内容で申請</button>
    <p class="note">地図・距離計算はOpenStreetMap（デモ用・無料・APIキー不要）。本番はGoogleマップ（検索候補つき・厳密な経路）に差し替えます。</p>
  </div>

  <div class="col-list">
    <h2>申請一覧<a href="#" id="csv">給与反映用CSV ↓</a></h2>
    <div id="list"></div>
  </div>
</main>

<script>
  var KEY = 'mycar-demo';
  var $ = function (id) { return document.getElementById(id); };
  function load() { try { return JSON.parse(localStorage.getItem(KEY) || '[]'); } catch (e) { return []; } }
  function save(l) { localStorage.setItem(KEY, JSON.stringify(l)); }
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (ch) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]; }); }
  function yen(n) { return Number(n).toLocaleString('ja-JP'); }

  var d = new Date();
  $('date').value = d.getFullYear() + '-' + ('0' + (d.getMonth() + 1)).slice(-2) + '-' + ('0' + d.getDate()).slice(-2);

  function calcAmount() {
    var km = parseFloat($('km').value), rate = parseFloat($('rate').value);
    if (isNaN(km) || isNaN(rate)) { $('amount').textContent = '—'; $('amount').classList.remove('lit'); return null; }
    var total = Math.round(km * rate * ($('round').checked ? 2 : 1));
    $('amount').textContent = yen(total);
    $('amount').classList.add('lit');
    return total;
  }
  $('km').addEventListener('input', calcAmount);
  $('rate').addEventListener('input', calcAmount);
  $('round').addEventListener('change', calcAmount);

  function showErr(msg) { var e = $('err'); e.textContent = msg; e.style.display = msg ? 'block' : 'none'; }

  function geocode(q) {
    return fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=jp&q=' + encodeURIComponent(q))
      .then(function (r) { return r.json(); })
      .then(function (j) { if (!j.length) throw new Error('場所が見つかりません: ' + q); return j[0]; });
  }

  // ---- 地図から選ぶ（タップでピン→ルート距離を自動計算） ----
  var map = L.map('map').setView([36.23, 137.97], 10);
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap contributors', maxZoom: 19 }).addTo(map);
  var pins = { from: null, to: null };
  var routeLine = null;
  var mapMode = 'from';
  function setMode(m) {
    mapMode = m;
    Array.prototype.forEach.call(document.querySelectorAll('#mapmode button'), function (b) {
      b.classList.toggle('on', b.getAttribute('data-m') === m);
    });
  }
  Array.prototype.forEach.call(document.querySelectorAll('#mapmode button'), function (b) {
    b.onclick = function () { setMode(b.getAttribute('data-m')); };
  });
  function setPin(which, latlng) {
    if (pins[which]) map.removeLayer(pins[which]);
    pins[which] = L.marker(latlng).addTo(map).bindPopup(which === 'from' ? '出発地' : '目的地');
  }
  function routeFromPins() {
    if (!pins.from || !pins.to) return;
    var a = pins.from.getLatLng(), b = pins.to.getLatLng();
    fetch('https://router.project-osrm.org/route/v1/driving/' + a.lng + ',' + a.lat + ';' + b.lng + ',' + b.lat + '?overview=full&geometries=geojson')
      .then(function (r) { return r.json(); })
      .then(function (j) {
        if (!j.routes || !j.routes.length) throw new Error('ルートが見つかりません');
        $('km').value = (j.routes[0].distance / 1000).toFixed(1);
        calcAmount();
        if (routeLine) map.removeLayer(routeLine);
        routeLine = L.geoJSON(j.routes[0].geometry, { style: { color: '#11688A', weight: 4, opacity: 0.75 } }).addTo(map);
        map.fitBounds(routeLine.getBounds(), { padding: [24, 24] });
      })
      .catch(function (e) { showErr((e.message || 'ルート計算に失敗しました') + '。距離(km)を手入力してください'); });
  }
  map.on('click', function (e) {
    var which = mapMode;
    showErr('');
    setPin(which, e.latlng);
    fetch('https://nominatim.openstreetmap.org/reverse?format=json&zoom=17&lat=' + e.latlng.lat + '&lon=' + e.latlng.lng)
      .then(function (r) { return r.json(); })
      .then(function (j) {
        var parts = String(j.display_name || '').split(',').map(function (s) { return s.trim(); });
        $(which).value = parts.slice(0, 2).join('') || (e.latlng.lat.toFixed(4) + ', ' + e.latlng.lng.toFixed(4));
      })
      .catch(function () { $(which).value = e.latlng.lat.toFixed(4) + ', ' + e.latlng.lng.toFixed(4); });
    if (which === 'from') setMode('to');
    routeFromPins();
  });

  $('calc').onclick = function () {
    var from = $('from').value.trim(), to = $('to').value.trim();
    if (!from || !to) { showErr('出発地と目的地を入力してください（または地図をタップ）'); return; }
    showErr('');
    $('calc').disabled = true;
    $('calc').textContent = '計算中…';
    Promise.all([geocode(from), geocode(to)]).then(function (pts) {
      setPin('from', L.latLng(parseFloat(pts[0].lat), parseFloat(pts[0].lon)));
      setPin('to', L.latLng(parseFloat(pts[1].lat), parseFloat(pts[1].lon)));
      routeFromPins();
    }).catch(function (e) {
      showErr((e.message || '自動計算に失敗しました') + '。距離(km)を手入力してください');
    }).finally(function () {
      $('calc').disabled = false;
      $('calc').textContent = '入力した住所から距離を計算';
    });
  };

  function render() {
    var list = load();
    $('list').innerHTML = list.length
      ? list.map(function (a, i) {
          return '<div class="app"><div class="info">' + esc(a.date) + '　' + esc(a.name || '（無記名）') +
            '<div class="meta">' + esc(a.from) + ' → ' + esc(a.to) + (a.round ? '（往復）' : '') + ' ｜ ' + esc(a.km) + 'km × ' + esc(a.rate) + '円</div></div>' +
            '<div class="amt">' + yen(a.amount) + '円</div>' +
            (a.approved ? '<span class="ok">承認済み</span>' : '<button data-i="' + i + '">承認</button>') + '</div>';
        }).join('')
      : '<div class="empty">まだ申請はありません。フォームから申請すると、承認者にはこの一覧が届きます</div>';
    Array.prototype.forEach.call(document.querySelectorAll('.app button'), function (b) {
      b.onclick = function () {
        var list = load();
        list[Number(b.getAttribute('data-i'))].approved = true;
        save(list); render();
      };
    });
  }

  $('submit').onclick = function () {
    var amount = calcAmount();
    if (amount === null) { showErr('距離と単価を入れてください（自動計算か手入力）'); return; }
    if (!$('from').value.trim() || !$('to').value.trim()) { showErr('出発地と目的地を入力してください'); return; }
    showErr('');
    var list = load();
    list.unshift({
      date: $('date').value, name: $('name').value.trim(),
      from: $('from').value.trim(), to: $('to').value.trim(),
      round: $('round').checked, km: parseFloat($('km').value), rate: parseFloat($('rate').value),
      amount: amount, approved: false,
    });
    save(list);
    $('to').value = ''; $('km').value = ''; $('amount').textContent = '—';
    render();
  };

  $('csv').onclick = function (e) {
    e.preventDefault();
    var rows = [['利用日', '氏名', '出発地', '目的地', '往復', '距離km', '単価', '支給額', '状態']];
    load().forEach(function (a) {
      rows.push([a.date, a.name, a.from, a.to, a.round ? '往復' : '片道', a.km, a.rate, a.amount, a.approved ? '承認済み' : '承認待ち']);
    });
    var csv = '﻿' + rows.map(function (r) { return r.map(function (c) { return '"' + String(c == null ? '' : c).replace(/"/g, '""') + '"'; }).join(','); }).join('\r\n');
    var a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
    a.download = 'マイカー利用費.csv';
    a.click();
  };

  render();
</script>
</body>
</html>
